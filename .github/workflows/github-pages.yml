name: Deploy to GitHub Pages

on:
  # Trigger on push to main branch
  push:
    branches: [main]
  # Allow manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      custom_domain:
        description: 'Custom domain for GitHub Pages (optional)'
        required: false
        type: string

# Set permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job - exports static site and prepares artifacts
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build webview
        run: npm run build:webview
        env:
          NODE_ENV: production

      - name: Export static site
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');

            // Default static site styles
            const BASE_CSS = \`
              * { box-sizing: border-box; }
              body {
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                line-height: 1.6;
                max-width: 900px;
                margin: 0 auto;
                padding: 20px;
                color: #333;
                background-color: #fafafa;
              }
              h1, h2, h3, h4, h5, h6 { line-height: 1.2; margin-top: 1.5em; margin-bottom: 0.5em; }
              h1 { font-size: 2em; border-bottom: 2px solid #eee; padding-bottom: 0.3em; }
              h2 { font-size: 1.5em; }
              h3 { font-size: 1.25em; }
              a { color: #0066cc; text-decoration: none; }
              a:hover { text-decoration: underline; }
              img { max-width: 100%; height: auto; }
              pre, code { background-color: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-family: 'Courier New', monospace; }
              pre { padding: 12px; overflow-x: auto; }
              blockquote { border-left: 4px solid #ddd; margin: 1em 0; padding-left: 1em; color: #666; }
            \`;

            // Strip HTML tags for basic text extraction
            function stripHtmlTags(html) {
              return html
                .replace(/<script[\s\S]*?<\/script>/gi, '')
                .replace(/<style[\s\S]*?<\/style>/gi, '')
                .replace(/<noscript[\s\S]*?<\/noscript>/gi, '')
                .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '')
                .replace(/<[^>]+>/g, '')
                .replace(/&nbsp;/g, ' ')
                .replace(/&amp;/g, '&')
                .replace(/&lt;/g, '<')
                .replace(/&gt;/g, '>')
                .trim();
            }

            // Extract title from HTML
            function extractTitle(html, defaultName) {
              const titleMatch = html.match(/<title[^>]*>([^<]*)<\/title>/i);
              if (titleMatch) return stripHtmlTags(titleMatch[1]).trim();
              const h1Match = html.match(/<h1[^>]*>([^<]*)<\/h1>/i);
              if (h1Match) return stripHtmlTags(h1Match[1]).trim();
              return defaultName;
            }

            // Wrap content in HTML document
            function wrapInHtmlDocument(content, title, siteTitle, siteDescription) {
              return \`<!DOCTYPE html>
<html lang=\"en\">
<head>
  <meta charset=\"UTF-8\">
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
  <meta name=\"description\" content=\"\${siteDescription}\">
  <title>\${title} - \${siteTitle}</title>
  <style>
\${BASE_CSS}
  </style>
</head>
<body>
\${content}
</body>
</html>\`;
            }

            // Extract body content from HTML
            function extractBody(html) {
              const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
              if (bodyMatch) return bodyMatch[1].trim();
              // Fallback: return the whole content
              return html;
            }

            // Create output directory
            const outputDir = '_site';
            if (!fs.existsSync(outputDir)) {
              fs.mkdirSync(outputDir, { recursive: true });
            }

            // Find all HTML files (excluding vendor and output directories)
            const htmlFiles = [];
            function findHtmlFiles(dir, baseDir) {
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              for (const entry of entries) {
                const fullPath = path.join(dir, entry.name);
                const relativePath = path.relative(baseDir, fullPath);
                if (entry.isDirectory()) {
                  if (!['node_modules', 'dist', 'webview', '.git', '_site'].includes(entry.name)) {
                    findHtmlFiles(fullPath, baseDir);
                  }
                } else if (entry.isFile() && /\.(html?|htm)$/i.test(entry.name)) {
                  htmlFiles.push({ fullPath, relativePath });
                }
              }
            }

            findHtmlFiles('.', '.');

            if (htmlFiles.length === 0) {
              console.log('No HTML files found. Creating default index page.');
              // Create a default index.html
              fs.writeFileSync(path.join(outputDir, 'index.html'), \`<!DOCTYPE html>
<html lang=\"en\">
<head>
  <meta charset=\"UTF-8\">
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
  <title>Htmly Site</title>
  <style>
\${BASE_CSS}
  </style>
</head>
<body>
  <h1>Welcome to Htmly</h1>
  <p>This is a placeholder for your exported static site. Add HTML files to your repository to see them exported here.</p>
</body>
</html>\`);
            } else {
              console.log('Found HTML files:', htmlFiles.map(f => f.relativePath));
              
              // Get site title from first file or repository name
              const repoName = process.env.GITHUB_REPOSITORY?.split('/')[1] || 'My Site';
              const siteTitle = repoName.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
              const siteDescription = 'A static site generated by Htmly';
              
              // Export each HTML file
              for (const { fullPath, relativePath } of htmlFiles) {
                const html = fs.readFileSync(fullPath, 'utf-8');
                const bodyContent = extractBody(html);
                const pageName = path.basename(relativePath, path.extname(relativePath));
                const title = extractTitle(html, pageName);
                
                // Create output path (maintain directory structure)
                const outputPath = relativePath.replace(/\\/g, '/');
                const outputFile = path.join(outputDir, outputPath);
                const outputDirForFile = path.dirname(outputFile);
                
                if (!fs.existsSync(outputDirForFile)) {
                  fs.mkdirSync(outputDirForFile, { recursive: true });
                }
                
                // Wrap content in HTML document
                const wrappedHtml = wrapInHtmlDocument(bodyContent, title, siteTitle, siteDescription);
                fs.writeFileSync(outputFile, wrappedHtml);
                console.log('Exported:', relativePath, '->', outputPath);
              }
              
              console.log('Static site export complete');
            }
          "

      - name: Create CNAME file for custom domain (if specified)
        if: inputs.custom_domain != ''
        run: |
          echo "${{ inputs.custom_domain }}" > _site/CNAME
          echo "CNAME file created with domain: ${{ inputs.custom_domain }}"

      - name: Verify static site output
        run: |
          echo "Contents of _site directory:"
          ls -la _site/
          if [ -f "_site/CNAME" ]; then
            echo "CNAME file exists in artifact:"
            cat _site/CNAME
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  # Deploy job - deploys to GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
