<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Embed Block Test</title></head>
  <body>
    <h1>Embed Block Test</h1>
    
    <h2>YouTube Video Embed</h2>
    <div class="embed-block">
      <iframe 
        src="about:blank" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
      </iframe>
    </div>
    
    <h2>Vimeo Video Embed</h2>
    <div class="embed-block">
      <iframe 
        src="about:blank" 
        frameborder="0" 
        allow="autoplay; fullscreen; picture-in-picture" 
        allowfullscreen>
      </iframe>
    </div>
    
    <h2>CodePen Embed</h2>
    <div class="embed-block">
      <iframe 
        src="about:blank" 
        frameborder="0" 
        allowfullscreen>
      </iframe>
    </div>
    
    <h2>Multiple Embeds</h2>
    <div class="embed-block">
      <iframe 
        src="about:blank" 
        frameborder="0" 
        allowfullscreen>
      </iframe>
    </div>
    <p>This text is between two embeds.</p>
    <div class="embed-block">
      <iframe 
        src="about:blank" 
        frameborder="0" 
        allowfullscreen>
      </iframe>
    </div>
    
    <p>End of embed test document.</p>
  </body>
</html>
