<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Embed Block Test</title></head>
  <body>
    <h1>Embed Block Test</h1>
    
    <h2>YouTube Video Embed</h2>
    <div class="embed-block">
      <iframe 
        src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
      </iframe>
    </div>
    
    <h2>Vimeo Video Embed</h2>
    <div class="embed-block">
      <iframe 
        src="https://player.vimeo.com/video/123456789" 
        frameborder="0" 
        allow="autoplay; fullscreen; picture-in-picture" 
        allowfullscreen>
      </iframe>
    </div>
    
    <h2>CodePen Embed</h2>
    <div class="embed-block">
      <iframe 
        src="https://codepen.io/user/embed/abc123?default-tab=result" 
        frameborder="0" 
        allow="accelerometer; ambient-light-sensor; camera; encrypted-media; geolocation; gyroscope; hid; microphone; midi; payment; usb; vr; xr-spatial-tracking" 
        allowfullscreen>
      </iframe>
    </div>
    
    <h2>CodeSandbox Embed</h2>
    <div class="embed-block">
      <iframe 
        src="https://codesandbox.io/embed/abc123?fontsize=14&hidenavigation=1&theme=dark&view=preview" 
        frameborder="0" 
        allow="accelerometer; ambient-light-sensor; camera; encrypted-media; geolocation; gyroscope; hid; microphone; midi; payment; usb; vr; xr-spatial-tracking" 
        allowfullscreen>
      </iframe>
    </div>
    
    <h2>Multiple Embeds</h2>
    <div class="embed-block">
      <iframe 
        src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
      </iframe>
    </div>
    <p>This text is between two embeds.</p>
    <div class="embed-block">
      <iframe 
        src="https://player.vimeo.com/video/456789" 
        frameborder="0" 
        allow="autoplay; fullscreen; picture-in-picture" 
        allowfullscreen>
      </iframe>
    </div>
    
    <p>End of embed test document.</p>
  </body>
</html>
