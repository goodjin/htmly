<!doctype html>
<html>
<head><meta charset="utf-8"><title>Nested</title></head>
<body>
  <article>
    <section>
      <div>
        <blockquote>
          <p>Deeply nested <strong>bold <em>and italic</em></strong> content.</p>
        </blockquote>
      </div>
    </section>
    <section>
      <ol>
        <li>First
          <ul><li>Nested bullet</li></ul>
        </li>
        <li>Second</li>
      </ol>
    </section>
  </article>
</body>
</html>
