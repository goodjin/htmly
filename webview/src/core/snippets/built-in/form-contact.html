<!-- snippet: {"name": "Contact Form", "category": "forms", "description": "A contact form with name, email, subject, and message"} -->
<form style="max-width: 480px; padding: 24px; background: white; border: 1px solid #e0e0e0; border-radius: 8px; font-family: system-ui, sans-serif;">
  <h2 style="margin: 0 0 20px 0; font-size: 24px; color: #333;">Contact Us</h2>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
    <div>
      <label style="display: block; margin-bottom: 6px; font-size: 14px; color: #333; font-weight: 500;">First Name</label>
      <input type="text" style="width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box;">
    </div>
    <div>
      <label style="display: block; margin-bottom: 6px; font-size: 14px; color: #333; font-weight: 500;">Last Name</label>
      <input type="text" style="width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box;">
    </div>
  </div>
  <div style="margin-bottom: 16px;">
    <label style="display: block; margin-bottom: 6px; font-size: 14px; color: #333; font-weight: 500;">Email</label>
    <input type="email" style="width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box;">
  </div>
  <div style="margin-bottom: 16px;">
    <label style="display: block; margin-bottom: 6px; font-size: 14px; color: #333; font-weight: 500;">Message</label>
    <textarea rows="4" style="width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; resize: vertical;"></textarea>
  </div>
  <button type="submit" style="background: #0066cc; color: white; border: none; padding: 12px 24px; border-radius: 4px; font-size: 16px; font-weight: 500; cursor: pointer;">Send Message</button>
</form>
