<form style="display: flex; gap: 12px; align-items: flex-end; font-family: system-ui, sans-serif;">
  <div>
    <label style="display: block; margin-bottom: 4px; font-size: 12px; color: #666;">Email</label>
    <input type="email" placeholder="your@email.com" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;">
  </div>
  <div>
    <label style="display: block; margin-bottom: 4px; font-size: 12px; color: #666;">Subscribe</label>
    <button type="submit" style="background: #28a745; color: white; border: none; padding: 8px 16px; border-radius: 4px; font-size: 14px; cursor: pointer;">Subscribe</button>
  </div>
</form>
