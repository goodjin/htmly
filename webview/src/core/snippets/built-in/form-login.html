<!-- snippet: {"name": "Login Form", "category": "forms", "description": "A login form with email and password fields"} -->
<form style="max-width: 320px; padding: 24px; background: white; border: 1px solid #e0e0e0; border-radius: 8px; font-family: system-ui, sans-serif;">
  <h2 style="margin: 0 0 20px 0; font-size: 24px; text-align: center; color: #333;">Sign In</h2>
  <div style="margin-bottom: 16px;">
    <label style="display: block; margin-bottom: 6px; font-size: 14px; color: #333; font-weight: 500;">Email</label>
    <input type="email" placeholder="you@example.com" style="width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box;">
  </div>
  <div style="margin-bottom: 20px;">
    <label style="display: block; margin-bottom: 6px; font-size: 14px; color: #333; font-weight: 500;">Password</label>
    <input type="password" placeholder="••••••••" style="width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box;">
  </div>
  <button type="submit" style="width: 100%; background: #0066cc; color: white; border: none; padding: 12px; border-radius: 4px; font-size: 16px; font-weight: 500; cursor: pointer;">Sign In</button>
</form>
